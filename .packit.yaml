specfile_path: freecad.spec
upstream_project_url: https://github.com/FreeCAD/FreeCAD.git
files_to_sync:
    - .packit.yaml
#actions:
#  post-upstream-clone:
#    - bash -c '/usr/bin/python3 package/scripts/write_version_info.py freecad_version.txt'
#    - rm -f freecad-sources.tar.gz
#  changelog-entry:
#    - bash -c 'git log --no-merges --pretty="format:- %s (%an)" $(git describe --tags --abbrev=0 )..HEAD -- |sed 's/%/%%/g''
#  create-archive:
#    - git submodule update --init
#    - bash -c 'git ls-files --recurse-submodules | tar  -caf freecad-sources.tar.gz -T-'
#    - echo -n 'freecad-sources.tar.gz'
downstream_package_name: freecad
upstream_tag_exclude: '.*'
notifications:
  pull_request:
    successful_build: false
additional_packages:
    - python3

jobs:
- job: copr_build
  identifier: pull_request
  trigger: pull_request
  notifications:
    pull_request:
      successful_build: True
  branch: main
  additional_repos:
    - copr://bpostle/IfcOpenShell
  manual_trigger: true
  targets:
    fedora-latest-stable:
      without_opts:
      - debug_info

- job: tests
  identifier: pull_request
  trigger: pull_request
  branch: main
  targets:
    fedora-latest-stable:
      without_opts:
      - debug_info
  fmf_path: package/fedora/tests

- job: copr_build
  identifier: main
  trigger: commit
  branch: main
  additional_repos:
    - copr://bpostle/IfcOpenShell
  owner: '@freecad'
  project: nightly
- job: tests
  identifier: main
  trigger: commit
  branch: main
  targets:
    fedora-latest-stable:
      without_opts:
      - debug_info
  fmf_path: package/fedora/tests
  owner: '@freecad'
  project: nightly

- job: copr_build
  identifier: release
  trigger: release
  owner: '@freecad'
  project: freecad
  additional_repos:
    - copr://bpostle/IfcOpenShell
  targets:
    fedora-all:
      without_opts:
      - tests
